<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0.3" />
    </filter>

    <pattern id="soil" width="128" height="128" patternUnits="userSpaceOnUse">
      <rect width="128" height="128" fill="#baaa92"/>

      <g fill="#a79b91" opacity="0.55">
        <circle cx="12" cy="20" r="2"/>
        <circle cx="34" cy="48" r="3"/>
        <circle cx="76" cy="22" r="2.5"/>
        <circle cx="110" cy="64" r="3"/>
        <circle cx="56" cy="96" r="2"/>
        <circle cx="96" cy="108" r="2.5"/>
        <circle cx="20" cy="88" r="3"/>
        <circle cx="88" cy="52" r="2"/>
      </g>

      <g fill="#9a8a72" opacity="0.45">
        <ellipse cx="28" cy="30" rx="5" ry="3"/>
        <ellipse cx="84" cy="74" rx="4" ry="2.5"/>
        <ellipse cx="114" cy="18" rx="5" ry="3"/>
        <ellipse cx="50" cy="118" rx="4" ry="2"/>
      </g>

      <rect width="128" height="128" filter="url(#noise)" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#soil)"/>
</svg>
